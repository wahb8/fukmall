<svg width="48" height="48" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <!-- perfectly balanced gradient -->
    <linearGradient id="grad" x1="8" y1="25" x2="42" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="black"/>
      <stop offset="50%" stop-color="#808080"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
  </defs>

  <!-- frame -->
  <rect x="5" y="10" width="40" height="30" fill="black"/>

  <!-- gradient area (centered evenly) -->
  <rect x="8" y="13" width="34" height="24" fill="url(#grad)"/>

</svg>