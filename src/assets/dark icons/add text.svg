<svg width="48" height="48" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Text document frame -->
  <rect x="4" y="4" width="40" height="40" rx="4" stroke="white" stroke-width="2" fill="none"></rect>
  
  <!-- Text lines -->
  <line x1="12" y1="14" x2="36" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="12" y1="22" x2="36" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="12" y1="30" x2="28" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  
  <!-- Plus sign circle background -->
  <circle cx="38" cy="38" r="10" fill="white" stroke="white" stroke-width="2"></circle>
  
  <!-- Plus sign - vertical line -->
  <line x1="38" y1="33" x2="38" y2="43" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  
  <!-- Plus sign - horizontal line -->
  <line x1="33" y1="38" x2="43" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"></line>
</svg>